# CashPilot Fleet - Multi-server deployment example
# https://github.com/GeiserX/CashPilot
#
# Deploy the UI + a local worker on your main server.
# Then deploy workers on each additional server using their own docker-compose.
#
# UI: Full dashboard + earnings collection (no Docker socket needed)
# Workers: Agents with Docker socket that manage containers and report to UI

# === Deploy on main server (e.g., server-a) ===
services:
  cashpilot-ui:
    image: drumsergio/cashpilot:latest
    pull_policy: always
    container_name: cashpilot-ui
    # Loopback by default (the UI commands the Docker-socket worker). Set
    # CASHPILOT_BIND_ADDR to a specific interface (e.g. a Tailscale/VPN IP) to reach
    # it from another machine, or 0.0.0.0 to publish on all interfaces. Prefer an
    # authenticating reverse proxy over binding the raw port publicly.
    ports:
      - "${CASHPILOT_BIND_ADDR:-127.0.0.1}:8080:8080"
    volumes:
      - cashpilot_data:/data
      - cashpilot_fleet:/fleet
    environment:
      - TZ=${TZ:-UTC}
      - CASHPILOT_SECRET_KEY=${CASHPILOT_SECRET_KEY}
      - CASHPILOT_API_KEY=${CASHPILOT_API_KEY}
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M

  cashpilot-worker:
    image: drumsergio/cashpilot-worker:latest
    pull_policy: always
    container_name: cashpilot-worker
    # The worker exposes a Docker-socket-backed API (deploy/stop/remove any
    # container = full host control), so it is bound to LOOPBACK by default and must
    # NEVER be published on 0.0.0.0. On this main server the co-located UI reaches it
    # over the compose network (cashpilot-worker:8081), not this published port —
    # only a REMOTE UI needs it published. If you must, set CASHPILOT_WORKER_BIND_ADDR
    # to a private/VPN interface (e.g. a Tailscale IP), never a public one, and keep
    # CASHPILOT_API_KEY secret.
    ports:
      - "${CASHPILOT_WORKER_BIND_ADDR:-127.0.0.1}:8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - cashpilot_worker_data:/data
      - cashpilot_fleet:/fleet
    environment:
      - TZ=${TZ:-UTC}
      - CASHPILOT_UI_URL=http://cashpilot-ui:8080
      - CASHPILOT_API_KEY=${CASHPILOT_API_KEY}
      - CASHPILOT_WORKER_NAME=server-a
      # CASHPILOT_WORKER_URL: override auto-detected URL if the UI can't reach the default
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M

