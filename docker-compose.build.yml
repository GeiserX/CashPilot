# CashPilot - build from source (for contributors / local development)
# https://github.com/GeiserX/CashPilot
#
# This file builds the UI and worker images from the local checkout instead of
# pulling the published releases. Use it when developing changes:
#
#   docker compose -f docker-compose.build.yml up -d --build
#
# Regular users should use the default docker-compose.yml, which pulls the
# published `latest` image (no build toolchain required).

services:
  cashpilot-ui:
    build: .
    image: drumsergio/cashpilot:dev
    container_name: cashpilot-ui
    ports:
      - "8080:8080"
    volumes:
      - cashpilot_data:/data
      - cashpilot_fleet:/fleet
    environment:
      - TZ=${TZ:-UTC}
      - CASHPILOT_SECRET_KEY=${CASHPILOT_SECRET_KEY:-}
      - CASHPILOT_API_KEY=${CASHPILOT_API_KEY:-}
      - CASHPILOT_ADMIN_API_KEY=${CASHPILOT_ADMIN_API_KEY:-}
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M

  cashpilot-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: drumsergio/cashpilot-worker:dev
    container_name: cashpilot-worker
    expose:
      - "8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - cashpilot_worker_data:/data
      - cashpilot_fleet:/fleet
    environment:
      - TZ=${TZ:-UTC}
      - CASHPILOT_UI_URL=http://cashpilot-ui:8080
      - CASHPILOT_API_KEY=${CASHPILOT_API_KEY:-}
      - CASHPILOT_WORKER_NAME=local
    init: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M

volumes:
  cashpilot_data:
  cashpilot_worker_data:
  cashpilot_fleet:
