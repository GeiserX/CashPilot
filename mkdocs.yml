site_name: CashPilot
site_url: https://geiserx.github.io/CashPilot
site_description: Self-hosted passive income orchestrator. Deploy, manage, and monitor 49 services from a single dashboard.
site_author: Sergio Fernandez
repo_url: https://github.com/GeiserX/CashPilot
repo_name: GeiserX/CashPilot
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Sergio Fernandez

theme:
  name: material
  language: en
  logo: logo.svg
  favicon: icon.svg
  palette:
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GeiserX/CashPilot
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/drumsergio/cashpilot

