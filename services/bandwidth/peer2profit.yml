name: Peer2Profit
slug: peer2profit
category: bandwidth
status: beta
website: https://peer2profit.com
description: >
  Peer2Profit lets you earn passive income by sharing your internet connection.
  Works on both residential and VPS/datacenter connections. The community Docker
  image (mrcolorrain) includes a VNC-based GUI. Status reporting may be unreliable,
  and the platform has had intermittent availability issues. The official image
  (peer2profit/peer2profit_linux) is no longer maintained; the community alternative
  is recommended.
short_description: Bandwidth sharing - works on VPS, status may be unreliable

referral:
  url_template: "https://peer2profit.com/r/{code}"
  code: ""
  signup_url: "https://peer2profit.com/r/{code}"
  bonus:
    referrer: "Percentage of referral earnings"
    referee: ""
  how_to_get_code: "Dashboard > Referral > Copy your referral link"

docker:
  image: mrcolorrain/peer2profit
  platforms: [linux/amd64]
  env:
    - key: P2P_EMAIL
      label: "Email"
      required: true
      secret: false
      description: "Your Peer2Profit account email"
  ports:
    - "5901:5901"
  volumes: []
  command: ""
  network_mode: ""

requirements:
  residential_ip: false
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto, paypal]
  minimum_payout: "$2"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 0
  monthly_high: 3
  currency: USD
  per: "device"
  notes: "Earnings highly variable. Status reporting may be unreliable. VPS connections accepted. VNC port 5901 for GUI management."

platforms: [windows, macos, linux, android, docker]

collector:
  type: manual
  notes: "Status unreliable. Dashboard may show inconsistent data. Manual verification recommended."
