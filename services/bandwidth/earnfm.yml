name: Earn.fm
slug: earnfm
category: bandwidth
status: active
website: https://earn.fm
description: >
  Earn.fm pays you for sharing your internet bandwidth. It authenticates via
  Supabase using email and password. Lightweight Docker image with
  straightforward deployment.
short_description: Bandwidth sharing - email/password auth, lightweight client

referral:
  signup_url: "https://earn.fm/ref/GEISYB91"

docker:
  image: earnfm/earnfm-client
  platforms: [linux/amd64, linux/arm64]
  env:
    - key: EARNFM_EMAIL
      label: "Email"
      required: true
      secret: false
      description: "Your Earn.fm account email"
    - key: EARNFM_PASSWORD
      label: "Password"
      required: true
      secret: true
      description: "Your Earn.fm account password (used for Supabase auth)"
  ports: []
  volumes: []
  command: ""
  network_mode: ""
  privileged: true

requirements:
  residential_ip: true
  vps_ip: true
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto]
  minimum_payout: "$15"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 0
  monthly_high: 3
  currency: USD
  per: "device"
  notes: "Relatively new platform. Earnings vary by location and bandwidth availability."

cashout:
  method: redirect
  dashboard_url: "https://app.earn.fm/#/payout"
  min_amount: 15.0
  currency: USD

platforms: [docker, linux]

collector:
  type: api
  notes: "Supabase auth via email/password. Dashboard at app.earn.fm shows earnings."
