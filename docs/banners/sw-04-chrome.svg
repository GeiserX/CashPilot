<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#08001a"/>
      <stop offset="100%" stop-color="#15002e"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="75%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="sun4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="35%" stop-color="#f97316"/>
      <stop offset="65%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="magenta4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="cyan4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="mg4"><feGaussianBlur stdDeviation="5" result="b"/><feFlood flood-color="#d946ef" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cg4"><feGaussianBlur stdDeviation="3" result="b"/><feFlood flood-color="#06b6d4" flood-opacity="0.4" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="chromeGlow"><feGaussianBlur stdDeviation="2" result="b"/><feFlood flood-color="#ffffff" flood-opacity="0.3" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc4"><circle cx="1000" cy="120" r="75"/></clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bg4)"/>

  <!-- Sun -->
  <circle cx="1000" cy="120" r="75" fill="url(#sun4)" opacity="0.75"/>
  <g clip-path="url(#sc4)">
    <rect x="920" y="120" width="160" height="4" fill="#08001a"/>
    <rect x="920" y="130" width="160" height="6" fill="#08001a"/>
    <rect x="920" y="143" width="160" height="8" fill="#08001a"/>
    <rect x="920" y="158" width="160" height="11" fill="#08001a"/>
    <rect x="920" y="176" width="160" height="15" fill="#08001a"/>
  </g>

  <!-- Grid -->
  <g stroke="#d946ef" stroke-width="0.5">
    <line x1="0" y1="200" x2="1200" y2="200" opacity="0.3"/>
    <line x1="0" y1="218" x2="1200" y2="218" opacity="0.2"/>
    <line x1="0" y1="238" x2="1200" y2="238" opacity="0.13"/>
    <line x1="0" y1="258" x2="1200" y2="258" opacity="0.08"/>
    <line x1="0" y1="278" x2="1200" y2="278" opacity="0.05"/>
    <line x1="600" y1="195" x2="0" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="200" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="400" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="600" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="800" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="1000" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="1200" y2="300" opacity="0.08"/>
  </g>

  <!-- Mountain silhouette -->
  <polygon points="0,200 100,175 200,185 320,155 420,170 500,145 580,165 650,150 720,170 800,160 880,180 950,165 1050,175 1130,185 1200,190 1200,200"
           fill="#10002a" opacity="0.9"/>

  <!-- Chrome title - big and metallic -->
  <text x="80" y="130" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="100" font-weight="900" fill="url(#chrome)" letter-spacing="-3" filter="url(#chromeGlow)">
    CashPilot
  </text>
  <!-- Pink shadow/outline behind -->
  <text x="82" y="132" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="100" font-weight="900" fill="none" stroke="url(#magenta4)" stroke-width="1.5" letter-spacing="-3" opacity="0.4">
    CashPilot
  </text>

  <!-- Tagline -->
  <text x="90" y="165" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="17" font-weight="600" fill="url(#cyan4)" letter-spacing="5" filter="url(#cg4)">
    SELF-HOSTED PASSIVE INCOME PLATFORM
  </text>

  <!-- Decorative lines under tagline -->
  <line x1="90" y1="178" x2="250" y2="178" stroke="url(#magenta4)" stroke-width="1.5" filter="url(#mg4)" opacity="0.7"/>
  <line x1="260" y1="178" x2="280" y2="178" stroke="url(#cyan4)" stroke-width="1.5" opacity="0.5"/>

  <rect x="0" y="0" width="1200" height="2.5" fill="url(#magenta4)" filter="url(#mg4)"/>
  <rect x="0" y="297.5" width="1200" height="2.5" fill="url(#cyan4)" filter="url(#cg4)"/>
</svg>
