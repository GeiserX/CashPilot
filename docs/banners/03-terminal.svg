    <!-- Status line -->
    <text x="55" y="248" fill="#94a3b8" font-size="13">
      <tspan fill="#22c55e">28 services</tspan> deployed |
      <tspan fill="#22c55e">3 nodes</tspan> online |
      <tspan fill="#22c55e">$4.27</tspan>/day
    </text>

    <!-- Prompt -->
