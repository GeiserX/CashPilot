<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="50%" stop-color="#1a1510"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="gold5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg5)"/>

  <!-- Subtle leather texture lines -->
  <g stroke="#f59e0b" stroke-width="0.3" opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="300"/>
    <line x1="100" y1="0" x2="1200" y2="220"/>
    <line x1="200" y1="0" x2="1200" y2="140"/>
    <line x1="0" y1="60" x2="1200" y2="300"/>
    <line x1="0" y1="160" x2="1080" y2="300"/>
    <line x1="0" y1="260" x2="640" y2="300"/>
  </g>

  <!-- Gold ornamental border -->
  <rect x="20" y="15" width="1160" height="270" rx="4" fill="none" stroke="url(#gold5)" stroke-width="1" opacity="0.25"/>
  <rect x="25" y="20" width="1150" height="260" rx="3" fill="none" stroke="url(#gold5)" stroke-width="0.5" opacity="0.15"/>

  <!-- Shield/crest icon -->
  <g transform="translate(130, 148)" filter="url(#goldGlow)">
    <!-- Shield outline -->
    <path d="M 0,-65 L 50,-45 L 50,10 Q 50,55 0,70 Q -50,55 -50,10 L -50,-45 Z"
          fill="none" stroke="url(#gold5)" stroke-width="2.5"/>
    <!-- Inner shield fill -->
    <path d="M 0,-55 L 40,-38 L 40,8 Q 40,45 0,58 Q -40,45 -40,8 L -40,-38 Z"
          fill="#f59e0b" opacity="0.06"/>
    <!-- Dollar/Pilot symbol -->
    <text x="0" y="12"
          font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700"
          fill="url(#gold5)" text-anchor="middle">P</text>
    <!-- Crown on top -->
    <g transform="translate(0,-78)">
      <polygon points="0,-12 -18,0 -12,-6 0,4 12,-6 18,0" fill="url(#gold5)" opacity="0.7"/>
    </g>
  </g>

  <!-- Title - serif elegant -->
  <text x="220" y="120"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="76" font-weight="700" fill="url(#goldLight)" letter-spacing="2">
    CashPilot
  </text>

  <!-- Divider line -->
  <line x1="220" y1="140" x2="620" y2="140" stroke="url(#gold5)" stroke-width="1" opacity="0.5"/>
  <!-- Diamond accent in divider -->
  <rect x="415" y="134" width="10" height="10" fill="url(#gold5)" transform="rotate(45 420 139)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="220" y="170"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18" font-weight="400" fill="#fde68a" letter-spacing="4" opacity="0.6">
    SELF-HOSTED PASSIVE INCOME
  </text>

  <!-- Right side: stacked coins illustration -->
  <g transform="translate(980, 200)" filter="url(#goldGlow)">
    <!-- Coin stack 1 -->
    <ellipse cx="-60" cy="0" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="-60" cy="-12" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="-60" cy="-24" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <line x1="-90" y1="-24" x2="-90" y2="0" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <line x1="-30" y1="-24" x2="-30" y2="0" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <!-- Coin stack 2 (taller) -->
    <ellipse cx="0" cy="0" rx="30" ry="8" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="0" cy="-12" rx="30" ry="8" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="0" cy="-24" rx="30" ry="8" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="0" cy="-36" rx="30" ry="8" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="0" cy="-48" rx="30" ry="8" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.9"/>
    <line x1="-30" y1="-48" x2="-30" y2="0" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
    <line x1="30" y1="-48" x2="30" y2="0" stroke="#fbbf24" stroke-width="1.5" opacity="0.4"/>
    <!-- Coin stack 3 (tallest) -->
    <ellipse cx="60" cy="0" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="60" cy="-12" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.55"/>
    <ellipse cx="60" cy="-24" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="60" cy="-36" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.65"/>
    <ellipse cx="60" cy="-48" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="60" cy="-60" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="60" cy="-72" rx="30" ry="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <line x1="30" y1="-72" x2="30" y2="0" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
    <line x1="90" y1="-72" x2="90" y2="0" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Gold top/bottom borders -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#gold5)" opacity="0.6"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#gold5)" opacity="0.3"/>
</svg>
