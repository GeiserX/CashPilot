<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#08001a"/>
      <stop offset="50%" stop-color="#18003a"/>
      <stop offset="100%" stop-color="#08001a"/>
    </linearGradient>
    <linearGradient id="sun5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="35%" stop-color="#f59e0b"/>
      <stop offset="65%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="hot5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="cool5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="pg5"><feGaussianBlur stdDeviation="5" result="b"/><feFlood flood-color="#ec4899" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cg5"><feGaussianBlur stdDeviation="4" result="b"/><feFlood flood-color="#06b6d4" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc5"><circle cx="150" cy="150" r="75"/></clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bg5)"/>

  <!-- Sun as compass background -->
  <circle cx="150" cy="150" r="75" fill="url(#sun5)" opacity="0.6"/>
  <g clip-path="url(#sc5)">
    <rect x="70" y="150" width="160" height="4" fill="#08001a"/>
    <rect x="70" y="160" width="160" height="6" fill="#08001a"/>
    <rect x="70" y="172" width="160" height="8" fill="#08001a"/>
    <rect x="70" y="186" width="160" height="11" fill="#08001a"/>
    <rect x="70" y="204" width="160" height="15" fill="#08001a"/>
  </g>

  <!-- Compass overlaid on sun -->
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#ec4899" stroke-width="2" filter="url(#pg5)" opacity="0.8"/>
    <!-- Ticks -->
    <line x1="0" y1="-70" x2="0" y2="-55" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" filter="url(#cg5)"/>
    <line x1="70" y1="0" x2="55" y2="0" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="70" x2="0" y2="55" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-70" y1="0" x2="-55" y2="0" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Heading arc -->
    <path d="M -28 -60 A 65 65 0 0 1 28 -60" fill="none" stroke="#ec4899" stroke-width="3" stroke-linecap="round" filter="url(#pg5)" opacity="0.7"/>
    <polygon points="0,-68 -5,-58 5,-58" fill="#f472b6"/>
    <!-- Needle -->
    <polygon points="0,-48 -10,0 0,-8 10,0" fill="url(#cool5)" filter="url(#cg5)"/>
    <polygon points="0,48 -10,0 0,8 10,0" fill="#2d1050" opacity="0.7"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="5" fill="#08001a" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="0" cy="0" r="2" fill="#22d3ee"/>
  </g>

  <!-- Grid (right side only) -->
  <g stroke="#06b6d4" stroke-width="0.5">
    <line x1="300" y1="200" x2="1200" y2="200" opacity="0.2"/>
    <line x1="300" y1="220" x2="1200" y2="220" opacity="0.15"/>
    <line x1="300" y1="242" x2="1200" y2="242" opacity="0.1"/>
    <line x1="300" y1="264" x2="1200" y2="264" opacity="0.06"/>
    <line x1="300" y1="284" x2="1200" y2="284" opacity="0.03"/>
    <line x1="600" y1="195" x2="300" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="450" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="600" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="750" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="900" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="1050" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="1200" y2="300" opacity="0.08"/>
  </g>

  <!-- Title -->
  <text x="280" y="125" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="88" font-weight="900" fill="url(#hot5)" letter-spacing="-2" filter="url(#pg5)">
    CashPilot
  </text>
  <text x="280" y="125" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="88" font-weight="900" fill="none" stroke="#fff" stroke-width="0.4" letter-spacing="-2" opacity="0.2">
    CashPilot
  </text>

  <text x="285" y="162" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="18" font-weight="600" fill="url(#cool5)" letter-spacing="5" filter="url(#cg5)">
    PASSIVE INCOME ON AUTOPILOT
  </text>

  <rect x="0" y="0" width="1200" height="2" fill="url(#hot5)" filter="url(#pg5)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#cool5)" filter="url(#cg5)"/>
</svg>
