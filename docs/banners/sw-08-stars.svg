<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000010"/>
      <stop offset="40%" stop-color="#0d0025"/>
      <stop offset="100%" stop-color="#000010"/>
    </linearGradient>
    <linearGradient id="sun8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fb923c"/>
      <stop offset="60%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="pink8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="cyan8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="pg8"><feGaussianBlur stdDeviation="6" result="b"/><feFlood flood-color="#f43f5e" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cg8"><feGaussianBlur stdDeviation="3" result="b"/><feFlood flood-color="#06b6d4" flood-opacity="0.4" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="starGlow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc8"><circle cx="900" cy="140" r="80"/></clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bg8)"/>

  <!-- Dense starfield -->
  <g fill="#fff" filter="url(#starGlow)">
    <circle cx="30" cy="25" r="1.2" opacity="0.8"/><circle cx="85" cy="60" r="0.7" opacity="0.5"/>
    <circle cx="120" cy="15" r="1" opacity="0.7"/><circle cx="180" cy="80" r="0.8" opacity="0.4"/>
    <circle cx="230" cy="40" r="1.3" opacity="0.9"/><circle cx="290" cy="95" r="0.6" opacity="0.3"/>
    <circle cx="340" cy="25" r="0.9" opacity="0.6"/><circle cx="410" cy="70" r="1.1" opacity="0.7"/>
    <circle cx="460" cy="35" r="0.7" opacity="0.5"/><circle cx="520" cy="90" r="1" opacity="0.4"/>
    <circle cx="570" cy="18" r="1.2" opacity="0.8"/><circle cx="640" cy="55" r="0.6" opacity="0.3"/>
    <circle cx="700" cy="30" r="1.1" opacity="0.7"/><circle cx="760" cy="85" r="0.8" opacity="0.5"/>
    <circle cx="830" cy="20" r="0.9" opacity="0.6"/><circle cx="880" cy="65" r="0.7" opacity="0.4"/>
    <circle cx="950" cy="35" r="1" opacity="0.6"/><circle cx="1020" cy="80" r="0.8" opacity="0.4"/>
    <circle cx="1070" cy="25" r="1.3" opacity="0.9"/><circle cx="1130" cy="50" r="0.7" opacity="0.5"/>
    <circle cx="1180" cy="15" r="1" opacity="0.7"/>
    <circle cx="55" cy="110" r="0.6" opacity="0.3"/><circle cx="160" cy="120" r="0.8" opacity="0.4"/>
    <circle cx="310" cy="115" r="0.7" opacity="0.3"/><circle cx="490" cy="125" r="0.9" opacity="0.4"/>
    <circle cx="650" cy="108" r="0.6" opacity="0.3"/><circle cx="1150" cy="100" r="0.7" opacity="0.3"/>
  </g>

  <!-- Shooting star -->
  <line x1="350" y1="30" x2="420" y2="55" stroke="url(#cyan8)" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <circle cx="350" cy="30" r="2" fill="#22d3ee" opacity="0.8" filter="url(#cg8)"/>

  <!-- Sun -->
  <circle cx="900" cy="140" r="80" fill="url(#sun8)" opacity="0.8"/>
  <g clip-path="url(#sc8)">
    <rect x="815" y="140" width="170" height="4" fill="#000010"/>
    <rect x="815" y="150" width="170" height="6" fill="#000010"/>
    <rect x="815" y="162" width="170" height="8" fill="#000010"/>
    <rect x="815" y="176" width="170" height="11" fill="#000010"/>
    <rect x="815" y="194" width="170" height="16" fill="#000010"/>
  </g>

  <!-- Grid -->
  <g stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="200" x2="1200" y2="200" opacity="0.2"/>
    <line x1="0" y1="220" x2="1200" y2="220" opacity="0.14"/>
    <line x1="0" y1="242" x2="1200" y2="242" opacity="0.09"/>
    <line x1="0" y1="264" x2="1200" y2="264" opacity="0.05"/>
    <line x1="600" y1="195" x2="0" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="200" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="400" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="600" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="800" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="1000" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="1200" y2="300" opacity="0.07"/>
  </g>

  <!-- Title -->
  <text x="80" y="125" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="90" font-weight="900" fill="url(#pink8)" letter-spacing="-2" filter="url(#pg8)">
    CashPilot
  </text>
  <text x="80" y="125" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="90" font-weight="900" fill="none" stroke="#fff" stroke-width="0.3" letter-spacing="-2" opacity="0.2">
    CashPilot
  </text>

  <text x="88" y="160" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="17" font-weight="600" fill="url(#cyan8)" letter-spacing="6" filter="url(#cg8)">
    PASSIVE INCOME ON AUTOPILOT
  </text>

  <rect x="0" y="0" width="1200" height="2" fill="url(#pink8)" filter="url(#pg8)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#cyan8)" filter="url(#cg8)"/>
</svg>
