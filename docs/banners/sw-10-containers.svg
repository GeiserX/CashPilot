<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#08001a"/>
      <stop offset="50%" stop-color="#15002e"/>
      <stop offset="100%" stop-color="#08001a"/>
    </linearGradient>
    <linearGradient id="sunA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#f59e0b"/>
      <stop offset="60%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pinkA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="cyanA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="pgA"><feGaussianBlur stdDeviation="5" result="b"/><feFlood flood-color="#ec4899" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cgA"><feGaussianBlur stdDeviation="3" result="b"/><feFlood flood-color="#06b6d4" flood-opacity="0.4" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="scA"><circle cx="600" cy="148" r="72"/></clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bgA)"/>

  <!-- Sun (center) -->
  <circle cx="600" cy="148" r="72" fill="url(#sunA)" opacity="0.55"/>
  <g clip-path="url(#scA)">
    <rect x="524" y="148" width="152" height="4" fill="#08001a"/>
    <rect x="524" y="158" width="152" height="5" fill="#08001a"/>
    <rect x="524" y="169" width="152" height="7" fill="#08001a"/>
    <rect x="524" y="182" width="152" height="10" fill="#08001a"/>
    <rect x="524" y="198" width="152" height="14" fill="#08001a"/>
  </g>

  <!-- Grid -->
  <g stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="200" x2="1200" y2="200" opacity="0.2"/>
    <line x1="0" y1="218" x2="1200" y2="218" opacity="0.14"/>
    <line x1="0" y1="240" x2="1200" y2="240" opacity="0.09"/>
    <line x1="0" y1="262" x2="1200" y2="262" opacity="0.05"/>
    <line x1="0" y1="284" x2="1200" y2="284" opacity="0.03"/>
    <line x1="600" y1="195" x2="0" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="150" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="300" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="450" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="600" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="750" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="900" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="1050" y2="300" opacity="0.07"/>
    <line x1="600" y1="195" x2="1200" y2="300" opacity="0.07"/>
  </g>

  <!-- Title -->
  <text x="600" y="75" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="78" font-weight="900" fill="url(#pinkA)" letter-spacing="-2" filter="url(#pgA)">
    CashPilot
  </text>
  <text x="600" y="75" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="78" font-weight="900" fill="none" stroke="#fff" stroke-width="0.3" letter-spacing="-2" opacity="0.2">
    CashPilot
  </text>

  <text x="600" y="105" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" font-weight="600" fill="url(#cyanA)" letter-spacing="5" filter="url(#cgA)">
    PASSIVE INCOME ON AUTOPILOT
  </text>

  <!-- Floating container cards on the grid plane -->
  <!-- Card 1 - left -->
  <g transform="translate(120, 215) skewX(-5)" opacity="0.85">
    <rect x="0" y="0" width="130" height="45" rx="4" fill="#15002e" stroke="#ec4899" stroke-width="1"/>
    <circle cx="16" cy="15" r="5" fill="#22c55e" opacity="0.8"/>
    <rect x="28" y="11" width="50" height="5" rx="2" fill="#f472b6" opacity="0.5"/>
    <rect x="28" y="22" width="35" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
    <text x="95" y="18" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.7">RUN</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(290, 220) skewX(-3)" opacity="0.8">
    <rect x="0" y="0" width="130" height="45" rx="4" fill="#15002e" stroke="#ec4899" stroke-width="1"/>
    <circle cx="16" cy="15" r="5" fill="#22c55e" opacity="0.8"/>
    <rect x="28" y="11" width="55" height="5" rx="2" fill="#f472b6" opacity="0.5"/>
    <rect x="28" y="22" width="40" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
    <text x="95" y="18" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.7">RUN</text>
  </g>

  <!-- Card 3 -->
  <g transform="translate(460, 218)" opacity="0.75">
    <rect x="0" y="0" width="130" height="45" rx="4" fill="#15002e" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="16" cy="15" r="5" fill="#22c55e" opacity="0.8"/>
    <rect x="28" y="11" width="45" height="5" rx="2" fill="#22d3ee" opacity="0.5"/>
    <rect x="28" y="22" width="55" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
    <text x="95" y="18" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.7">RUN</text>
  </g>

  <!-- Card 4 -->
  <g transform="translate(640, 220) skewX(3)" opacity="0.75">
    <rect x="0" y="0" width="130" height="45" rx="4" fill="#15002e" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="16" cy="15" r="5" fill="#f59e0b" opacity="0.8"/>
    <rect x="28" y="11" width="60" height="5" rx="2" fill="#22d3ee" opacity="0.5"/>
    <rect x="28" y="22" width="38" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
    <text x="95" y="18" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.7">INIT</text>
  </g>

  <!-- Card 5 -->
  <g transform="translate(810, 218) skewX(5)" opacity="0.8">
    <rect x="0" y="0" width="130" height="45" rx="4" fill="#15002e" stroke="#ec4899" stroke-width="1"/>
    <circle cx="16" cy="15" r="5" fill="#22c55e" opacity="0.8"/>
    <rect x="28" y="11" width="48" height="5" rx="2" fill="#f472b6" opacity="0.5"/>
    <rect x="28" y="22" width="42" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
    <text x="95" y="18" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.7">RUN</text>
  </g>

  <!-- Card 6 -->
  <g transform="translate(975, 215) skewX(7)" opacity="0.85">
    <rect x="0" y="0" width="130" height="45" rx="4" fill="#15002e" stroke="#ec4899" stroke-width="1"/>
    <circle cx="16" cy="15" r="5" fill="#22c55e" opacity="0.8"/>
    <rect x="28" y="11" width="52" height="5" rx="2" fill="#f472b6" opacity="0.5"/>
    <rect x="28" y="22" width="36" height="4" rx="2" fill="#94a3b8" opacity="0.3"/>
    <text x="95" y="18" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.7">RUN</text>
  </g>

  <rect x="0" y="0" width="1200" height="2" fill="url(#pinkA)" filter="url(#pgA)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#cyanA)" filter="url(#cgA)"/>
</svg>
