<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0018"/>
      <stop offset="100%" stop-color="#12002a"/>
    </linearGradient>
    <linearGradient id="sun6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pink6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="cyan6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="pg6"><feGaussianBlur stdDeviation="8" result="b"/><feFlood flood-color="#ec4899" flood-opacity="0.6" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cg6"><feGaussianBlur stdDeviation="4" result="b"/><feFlood flood-color="#06b6d4" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc6"><circle cx="600" cy="250" r="120"/></clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bg6)"/>

  <!-- Large sun at bottom center (half visible) -->
  <circle cx="600" cy="250" r="120" fill="url(#sun6)" opacity="0.7"/>
  <g clip-path="url(#sc6)">
    <rect x="475" y="250" width="250" height="5" fill="#0a0018"/>
    <rect x="475" y="262" width="250" height="7" fill="#0a0018"/>
    <rect x="475" y="276" width="250" height="10" fill="#0a0018"/>
    <rect x="475" y="293" width="250" height="14" fill="#0a0018"/>
  </g>

  <!-- Just the horizon line -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#ec4899" stroke-width="0.8" opacity="0.3"/>

  <!-- Minimal grid - fewer lines -->
  <g stroke="#06b6d4" stroke-width="0.4">
    <line x1="0" y1="220" x2="1200" y2="220" opacity="0.15"/>
    <line x1="0" y1="245" x2="1200" y2="245" opacity="0.08"/>
    <line x1="0" y1="275" x2="1200" y2="275" opacity="0.04"/>
    <line x1="600" y1="200" x2="200" y2="300" opacity="0.06"/>
    <line x1="600" y1="200" x2="400" y2="300" opacity="0.06"/>
    <line x1="600" y1="200" x2="600" y2="300" opacity="0.06"/>
    <line x1="600" y1="200" x2="800" y2="300" opacity="0.06"/>
    <line x1="600" y1="200" x2="1000" y2="300" opacity="0.06"/>
  </g>

  <!-- Title - centered, massive -->
  <text x="600" y="120" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="110" font-weight="900" fill="url(#pink6)" letter-spacing="-4" filter="url(#pg6)">
    CashPilot
  </text>

  <!-- Tagline -->
  <text x="600" y="160" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="18" font-weight="500" fill="url(#cyan6)" letter-spacing="8" filter="url(#cg6)">
    PASSIVE INCOME ON AUTOPILOT
  </text>

  <rect x="0" y="0" width="1200" height="2" fill="url(#pink6)" filter="url(#pg6)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#cyan6)" filter="url(#cg6)"/>
</svg>
