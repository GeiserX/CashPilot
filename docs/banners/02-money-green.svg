<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="50%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="green2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="greenFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg2)"/>

  <!-- Dollar pattern background -->
  <g font-family="Georgia, serif" font-size="120" fill="#22c55e" opacity="0.04" font-weight="700">
    <text x="50" y="120">$</text>
    <text x="250" y="250">$</text>
    <text x="500" y="100">$</text>
    <text x="700" y="270">$</text>
    <text x="900" y="130">$</text>
    <text x="1050" y="220">$</text>
  </g>

  <!-- Rising arrow / growth indicator -->
  <g transform="translate(100, 150)" filter="url(#greenGlow)">
    <!-- Circular coin shape -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#22c55e" stroke-width="3"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="60" fill="#22c55e" opacity="0.06"/>
    <!-- Dollar sign inside -->
    <text x="0" y="20"
          font-family="Georgia, serif" font-size="72" font-weight="700"
          fill="url(#green2)" text-anchor="middle" opacity="0.9">$</text>
    <!-- Upward arrow overlay -->
    <polygon points="0,-30 15,-10 6,-10 6,15 -6,15 -6,-10 -15,-10" fill="#4ade80" opacity="0.5" transform="translate(30,-30) scale(0.6)"/>
  </g>

  <!-- Title -->
  <text x="200" y="130"
        font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="82" font-weight="900" fill="#f0fdf4" letter-spacing="-3">
    Cash<tspan fill="url(#green2)">Pilot</tspan>
  </text>

  <!-- Tagline -->
  <text x="205" y="175"
        font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="22" font-weight="500" fill="#86efac" letter-spacing="0.5" opacity="0.7">
    Deploy. Earn. Scale. Repeat.
  </text>

  <!-- Accent bar -->
  <rect x="205" y="190" width="100" height="3" rx="1.5" fill="url(#green2)" opacity="0.8"/>

  <!-- Earnings chart - aggressive upward trend -->
  <g>
    <path d="M 650 260 L 720 250 L 780 240 L 830 235 L 880 210 L 930 195 L 980 160 L 1030 120 L 1080 80 L 1130 50 L 1130 260 Z"
          fill="url(#greenFade)"/>
    <polyline
      points="650,260 720,250 780,240 830,235 880,210 930,195 980,160 1030,120 1080,80 1130,50"
      fill="none" stroke="url(#green2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#greenGlow)"/>
    <circle cx="1030" cy="120" r="4" fill="#4ade80" filter="url(#greenGlow)"/>
    <circle cx="1080" cy="80" r="4" fill="#4ade80" filter="url(#greenGlow)"/>
    <circle cx="1130" cy="50" r="5" fill="#4ade80" filter="url(#greenGlow)"/>
    <!-- Value label -->
    <text x="1130" y="40" font-family="monospace" font-size="14" fill="#4ade80" text-anchor="middle" filter="url(#greenGlow)" opacity="0.8">+127%</text>
  </g>

  <!-- Top green line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#green2)"/>
  <rect x="0" y="297" width="1200" height="3" fill="url(#green2)" opacity="0.3"/>
</svg>
