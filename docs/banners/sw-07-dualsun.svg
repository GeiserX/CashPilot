<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0020"/>
      <stop offset="50%" stop-color="#150035"/>
      <stop offset="100%" stop-color="#0a0020"/>
    </linearGradient>
    <linearGradient id="sunL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="sunR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="pink7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="cyan7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="pg7"><feGaussianBlur stdDeviation="6" result="b"/><feFlood flood-color="#ec4899" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cg7"><feGaussianBlur stdDeviation="5" result="b"/><feFlood flood-color="#06b6d4" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="scL"><circle cx="200" cy="160" r="60"/></clipPath>
    <clipPath id="scR"><circle cx="1000" cy="160" r="60"/></clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bg7)"/>

  <!-- Left sun (pink) -->
  <circle cx="200" cy="160" r="60" fill="url(#sunL)" opacity="0.6"/>
  <g clip-path="url(#scL)">
    <rect x="136" y="160" width="128" height="4" fill="#0a0020"/>
    <rect x="136" y="170" width="128" height="5" fill="#0a0020"/>
    <rect x="136" y="181" width="128" height="7" fill="#0a0020"/>
    <rect x="136" y="194" width="128" height="10" fill="#0a0020"/>
    <rect x="136" y="210" width="128" height="14" fill="#0a0020"/>
  </g>

  <!-- Right sun (cyan) -->
  <circle cx="1000" cy="160" r="60" fill="url(#sunR)" opacity="0.6"/>
  <g clip-path="url(#scR)">
    <rect x="936" y="160" width="128" height="4" fill="#0a0020"/>
    <rect x="936" y="170" width="128" height="5" fill="#0a0020"/>
    <rect x="936" y="181" width="128" height="7" fill="#0a0020"/>
    <rect x="936" y="194" width="128" height="10" fill="#0a0020"/>
    <rect x="936" y="210" width="128" height="14" fill="#0a0020"/>
  </g>

  <!-- Grid -->
  <g stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="200" x2="1200" y2="200" opacity="0.25"/>
    <line x1="0" y1="220" x2="1200" y2="220" opacity="0.15"/>
    <line x1="0" y1="242" x2="1200" y2="242" opacity="0.1"/>
    <line x1="0" y1="264" x2="1200" y2="264" opacity="0.06"/>
    <line x1="0" y1="284" x2="1200" y2="284" opacity="0.03"/>
    <line x1="600" y1="195" x2="0" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="200" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="400" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="600" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="800" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="1000" y2="300" opacity="0.08"/>
    <line x1="600" y1="195" x2="1200" y2="300" opacity="0.08"/>
  </g>

  <!-- Title centered between suns -->
  <text x="600" y="110" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="85" font-weight="900" letter-spacing="-2">
    <tspan fill="url(#pink7)" filter="url(#pg7)">Cash</tspan><tspan fill="url(#cyan7)" filter="url(#cg7)">Pilot</tspan>
  </text>
  <!-- White outline -->
  <text x="600" y="110" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="85" font-weight="900" fill="none" stroke="#fff" stroke-width="0.3" letter-spacing="-2" opacity="0.15">
    CashPilot
  </text>

  <text x="600" y="145" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="16" font-weight="600" fill="#a78bfa" letter-spacing="6" opacity="0.8">
    SELF-HOSTED PASSIVE INCOME PLATFORM
  </text>

  <!-- Decorative line -->
  <line x1="420" y1="160" x2="540" y2="160" stroke="url(#pink7)" stroke-width="1.5" opacity="0.5"/>
  <line x1="660" y1="160" x2="780" y2="160" stroke="url(#cyan7)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="600" cy="160" r="3" fill="#a78bfa" opacity="0.6"/>

  <rect x="0" y="0" width="1200" height="2" fill="url(#pink7)" filter="url(#pg7)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#cyan7)" filter="url(#cg7)"/>
</svg>
