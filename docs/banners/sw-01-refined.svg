<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a001a"/>
      <stop offset="40%" stop-color="#1a0035"/>
      <stop offset="100%" stop-color="#0a001a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#f59e0b"/>
      <stop offset="60%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="pGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feFlood flood-color="#ec4899" flood-opacity="0.6" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="sunClip"><circle cx="950" cy="130" r="85"/></clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Sun with clip-masked stripes -->
  <circle cx="950" cy="130" r="85" fill="url(#sun)" opacity="0.85"/>
  <g clip-path="url(#sunClip)">
    <rect x="860" y="130" width="180" height="5" fill="#0a001a"/>
    <rect x="860" y="142" width="180" height="7" fill="#0a001a"/>
    <rect x="860" y="156" width="180" height="9" fill="#0a001a"/>
    <rect x="860" y="172" width="180" height="12" fill="#0a001a"/>
    <rect x="860" y="192" width="180" height="16" fill="#0a001a"/>
  </g>

  <!-- Horizon line -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#ec4899" stroke-width="1" opacity="0.4"/>

  <!-- Perspective grid -->
  <g stroke="#06b6d4" stroke-width="0.6">
    <line x1="0" y1="215" x2="1200" y2="215" opacity="0.25"/>
    <line x1="0" y1="232" x2="1200" y2="232" opacity="0.2"/>
    <line x1="0" y1="250" x2="1200" y2="250" opacity="0.15"/>
    <line x1="0" y1="268" x2="1200" y2="268" opacity="0.1"/>
    <line x1="0" y1="284" x2="1200" y2="284" opacity="0.07"/>
    <!-- Vanishing point at center-bottom -->
    <line x1="600" y1="200" x2="0" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="100" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="200" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="300" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="400" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="500" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="600" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="700" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="800" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="900" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="1000" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="1100" y2="300" opacity="0.12"/>
    <line x1="600" y1="200" x2="1200" y2="300" opacity="0.12"/>
  </g>

  <!-- Title -->
  <text x="70" y="120" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="92" font-weight="900" fill="url(#pink)" letter-spacing="-2" filter="url(#pGlow)">
    CashPilot
  </text>
  <!-- Chrome outline -->
  <text x="70" y="120" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="92" font-weight="900" fill="none" stroke="#fff" stroke-width="0.4" letter-spacing="-2" opacity="0.25">
    CashPilot
  </text>

  <!-- Tagline -->
  <text x="75" y="158" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="18" font-weight="600" fill="url(#cyan)" letter-spacing="6" filter="url(#cGlow)">
    PASSIVE INCOME ON AUTOPILOT
  </text>

  <!-- Neon border lines -->
  <rect x="0" y="0" width="1200" height="2.5" fill="url(#pink)" filter="url(#pGlow)"/>
  <rect x="0" y="297.5" width="1200" height="2.5" fill="url(#cyan)" filter="url(#cGlow)"/>
</svg>
