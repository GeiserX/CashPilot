  <!-- Window lights on buildings -->
  <g fill="#fbbf24" opacity="0.4">
    <rect x="115" y="138" width="3" height="3"/><rect x="123" y="138" width="3" height="3"/>
    <rect x="235" y="126" width="3" height="3"/><rect x="243" y="126" width="3" height="3"/>
    <rect x="270" y="118" width="3" height="3"/>
    <rect x="315" y="112" width="3" height="3"/><rect x="325" y="112" width="3" height="3"/>
    <rect x="365" y="98" width="3" height="3"/><rect x="373" y="98" width="3" height="3"/>
    <rect x="425" y="112" width="3" height="3"/><rect x="433" y="112" width="3" height="3"/>
    <rect x="705" y="128" width="3" height="3"/><rect x="713" y="128" width="3" height="3"/>
    <rect x="745" y="118" width="3" height="3"/>
    <rect x="785" y="108" width="3" height="3"/><rect x="793" y="108" width="3" height="3"/>
    <rect x="845" y="122" width="3" height="3"/>
    <rect x="965" y="152" width="3" height="3"/>
  </g>

  <!-- Grid floor -->
  <g stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="215" x2="1200" y2="215" opacity="0.25"/>
    <line x1="0" y1="235" x2="1200" y2="235" opacity="0.18"/>
    <line x1="0" y1="255" x2="1200" y2="255" opacity="0.12"/>
    <line x1="0" y1="275" x2="1200" y2="275" opacity="0.07"/>
    <line x1="600" y1="200" x2="0" y2="300" opacity="0.1"/>
    <line x1="600" y1="200" x2="150" y2="300" opacity="0.1"/>
    <line x1="600" y1="200" x2="300" y2="300" opacity="0.1"/>
    <line x1="600" y1="200" x2="450" y2="300" opacity="0.1"/>
    <line x1="600" y1="200" x2="600" y2="300" opacity="0.1"/>
    <line x1="600" y1="200" x2="750" y2="300" opacity="0.1"/>
    <line x1="600" y1="200" x2="900" y2="300" opacity="0.1"/>
    <line x1="600" y1="200" x2="1050" y2="300" opacity="0.1"/>
    <line x1="600" y1="200" x2="1200" y2="300" opacity="0.1"/>
  </g>

  <!-- Title - top center -->
  <text x="600" y="75" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="72" font-weight="900" fill="url(#pink2)" letter-spacing="-1" filter="url(#pg2)">
    CashPilot
