  </text>

  <!-- Tagline -->
  <text x="600" y="105" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="16" font-weight="600" fill="url(#cyan2)" letter-spacing="5" filter="url(#cg2)">
    SELF-HOSTED PASSIVE INCOME PLATFORM
