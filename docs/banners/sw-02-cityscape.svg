  <text x="600" y="75" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="72" font-weight="900" fill="none" stroke="#fff" stroke-width="0.3" letter-spacing="-1" opacity="0.2">
