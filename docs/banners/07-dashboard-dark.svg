<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blue7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="green7" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg7)"/>

  <!-- Left side: Big bold branding -->
  <text x="50" y="125"
        font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="88" font-weight="900" fill="#f8fafc" letter-spacing="-3">
    Cash<tspan fill="url(#blue7)">Pilot</tspan>
  </text>
  <text x="55" y="160"
        font-family="Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="18" font-weight="500" fill="#64748b" letter-spacing="0.5">
    Self-hosted passive income platform
  </text>

  <!-- Mini dashboard mockup (right side) -->
  <g transform="translate(560, 20)">
    <!-- Dashboard card background -->
    <rect x="0" y="0" width="610" height="260" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- Sidebar -->
    <rect x="0" y="0" width="120" height="260" rx="12" fill="#0f172a"/>
    <rect x="60" y="0" width="60" height="260" fill="#0f172a"/>
    <!-- Sidebar items -->
    <rect x="15" y="20" width="90" height="8" rx="4" fill="#3b82f6" opacity="0.3"/>
    <rect x="15" y="45" width="70" height="6" rx="3" fill="#475569" opacity="0.4"/>
    <rect x="15" y="60" width="80" height="6" rx="3" fill="#3b82f6" opacity="0.6"/>
    <rect x="15" y="75" width="60" height="6" rx="3" fill="#475569" opacity="0.4"/>
    <rect x="15" y="90" width="75" height="6" rx="3" fill="#475569" opacity="0.4"/>
    <rect x="15" y="105" width="65" height="6" rx="3" fill="#475569" opacity="0.4"/>

    <!-- Main content area -->
    <!-- Top stats row -->
    <g transform="translate(135, 15)">
      <!-- Stat card 1 -->
      <rect x="0" y="0" width="140" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <text x="15" y="20" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Total Earnings</text>
      <text x="15" y="42" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#22c55e">$142.87</text>

      <!-- Stat card 2 -->
      <rect x="150" y="0" width="140" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <text x="165" y="20" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Active Services</text>
      <text x="165" y="42" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#3b82f6">24</text>

      <!-- Stat card 3 -->
      <rect x="300" y="0" width="140" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <text x="315" y="20" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Nodes Online</text>
      <text x="315" y="42" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#a78bfa">3</text>
    </g>

    <!-- Chart area -->
    <g transform="translate(135, 85)">
      <rect x="0" y="0" width="460" height="100" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <text x="15" y="20" font-family="Inter, sans-serif" font-size="10" fill="#64748b">Earnings (30d)</text>
      <!-- Chart line -->
      <polyline points="15,80 55,75 95,70 135,72 175,60 215,55 255,50 295,48 335,40 375,35 415,25 445,20"
                fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
      <path d="M 15 80 L 55 75 L 95 70 L 135 72 L 175 60 L 215 55 L 255 50 L 295 48 L 335 40 L 375 35 L 415 25 L 445 20 L 445 85 L 15 85 Z"
            fill="url(#green7)" opacity="0.5"/>
    </g>

    <!-- Service list -->
    <g transform="translate(135, 195)">
      <rect x="0" y="0" width="460" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <!-- Row 1 -->
      <circle cx="20" cy="17" r="5" fill="#22c55e"/>
      <rect x="32" y="13" width="60" height="6" rx="3" fill="#e2e8f0" opacity="0.7"/>
      <rect x="100" y="13" width="40" height="6" rx="3" fill="#22c55e" opacity="0.5"/>
      <rect x="350" y="13" width="50" height="6" rx="3" fill="#64748b" opacity="0.5"/>
      <rect x="410" y="13" width="35" height="6" rx="3" fill="#22c55e" opacity="0.3"/>
      <!-- Row 2 -->
      <circle cx="20" cy="38" r="5" fill="#22c55e"/>
      <rect x="32" y="34" width="55" height="6" rx="3" fill="#e2e8f0" opacity="0.7"/>
      <rect x="95" y="34" width="50" height="6" rx="3" fill="#3b82f6" opacity="0.5"/>
      <rect x="350" y="34" width="45" height="6" rx="3" fill="#64748b" opacity="0.5"/>
      <rect x="410" y="34" width="30" height="6" rx="3" fill="#22c55e" opacity="0.3"/>
    </g>
  </g>

  <!-- Subtle gradient overlay on bottom -->
  <rect x="0" y="280" width="560" height="20" fill="url(#bg7)" opacity="0.8"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#blue7)"/>
</svg>
