name: Build and Push Docker Images

on:
  workflow_call:
    inputs:
      build_ui:
        type: boolean
        default: true
      build_worker:
        type: boolean
        default: true
      version:
        description: 'Version tag (e.g. v0.2.1)'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      build_ui:
        description: 'Build UI image'
        type: boolean
        default: true
      build_worker:
        description: 'Build Worker image'
        type: boolean
        default: true
      version:
        description: 'Version tag (e.g. v0.2.1) — leave empty for latest'
        type: string
        default: ''

concurrency:
  group: build-${{ inputs.version || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-tags:
    runs-on: [self-hosted, Linux, X64]
    outputs:
      ui_tags: ${{ steps.tags.outputs.ui_tags }}
      worker_tags: ${{ steps.tags.outputs.worker_tags }}
      version: ${{ steps.tags.outputs.version }}
    steps:
      - id: tags
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "ui_tags=drumsergio/cashpilot:latest" >> "$GITHUB_OUTPUT"
            echo "worker_tags=drumsergio/cashpilot-worker:latest" >> "$GITHUB_OUTPUT"
            echo "version=latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VER="${VERSION#v}"
          MAJOR_MINOR="$(echo "$VER" | cut -d. -f1).$(echo "$VER" | cut -d. -f2)"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

          UI="drumsergio/cashpilot:latest
          drumsergio/cashpilot:${VER}
          drumsergio/cashpilot:${MAJOR_MINOR}"

          WORKER="drumsergio/cashpilot-worker:latest
          drumsergio/cashpilot-worker:${VER}
          drumsergio/cashpilot-worker:${MAJOR_MINOR}"

          {
            echo "ui_tags<<EOF"
            echo "$UI"
            echo "EOF"
            echo "worker_tags<<EOF"
            echo "$WORKER"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/ && ruff format --check app/

  build-ui-amd64:
    needs: [lint, resolve-tags]
    if: inputs.build_ui
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: drumsergio/cashpilot:${{ needs.resolve-tags.outputs.version }}-amd64
          cache-from: type=gha,scope=ui-amd64
          cache-to: type=gha,mode=max,scope=ui-amd64

  build-ui-arm64:
    needs: [lint, resolve-tags]
    if: inputs.build_ui
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: drumsergio/cashpilot:${{ needs.resolve-tags.outputs.version }}-arm64
          cache-from: type=gha,scope=ui-arm64
          cache-to: type=gha,mode=max,scope=ui-arm64

  build-worker-amd64:
    needs: [lint, resolve-tags]
    if: inputs.build_worker
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64
          push: true
          tags: drumsergio/cashpilot-worker:${{ needs.resolve-tags.outputs.version }}-amd64
          cache-from: type=gha,scope=worker-amd64
          cache-to: type=gha,mode=max,scope=worker-amd64

  build-worker-arm64:
    needs: [lint, resolve-tags]
    if: inputs.build_worker
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/arm64
          push: true
          tags: drumsergio/cashpilot-worker:${{ needs.resolve-tags.outputs.version }}-arm64
          cache-from: type=gha,scope=worker-arm64
          cache-to: type=gha,mode=max,scope=worker-arm64

  manifest:
    needs: [resolve-tags, build-ui-amd64, build-ui-arm64, build-worker-amd64, build-worker-arm64]
    if: always() && !cancelled()
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create UI manifests
        if: inputs.build_ui && needs.build-ui-amd64.result == 'success' && needs.build-ui-arm64.result == 'success'
        run: |
          TAGS="${{ needs.resolve-tags.outputs.ui_tags }}"
          VER="${{ needs.resolve-tags.outputs.version }}"
          for tag in $TAGS; do
            docker buildx imagetools create -t "$tag" \
              "drumsergio/cashpilot:${VER}-amd64" \
              "drumsergio/cashpilot:${VER}-arm64"
          done
      - name: Create Worker manifests
        if: inputs.build_worker && needs.build-worker-amd64.result == 'success' && needs.build-worker-arm64.result == 'success'
        run: |
          TAGS="${{ needs.resolve-tags.outputs.worker_tags }}"
          VER="${{ needs.resolve-tags.outputs.version }}"
          for tag in $TAGS; do
            docker buildx imagetools create -t "$tag" \
              "drumsergio/cashpilot-worker:${VER}-amd64" \
              "drumsergio/cashpilot-worker:${VER}-arm64"
          done
