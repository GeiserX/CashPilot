name: Build and Push Docker Images

on:
  workflow_call:
    inputs:
      build_ui:
        type: boolean
        default: true
      build_worker:
        type: boolean
        default: true
      version:
        description: 'Version tag (e.g. v0.2.1)'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      build_ui:
        description: 'Build UI image'
        type: boolean
        default: true
      build_worker:
        description: 'Build Worker image'
        type: boolean
        default: true
      version:
        description: 'Version tag (e.g. v0.2.1) — leave empty for latest'
        type: string
        default: ''

concurrency:
  group: build-${{ inputs.version || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-tags:
    runs-on: [self-hosted, Linux, X64]
    outputs:
      ui_tags: ${{ steps.tags.outputs.ui_tags }}
      worker_tags: ${{ steps.tags.outputs.worker_tags }}
      version: ${{ steps.tags.outputs.version }}
    steps:
      - id: tags
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "ui_tags=drumsergio/cashpilot:latest" >> "$GITHUB_OUTPUT"
            echo "worker_tags=drumsergio/cashpilot-worker:latest" >> "$GITHUB_OUTPUT"
            echo "version=latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VER="${VERSION#v}"
          MAJOR_MINOR="$(echo "$VER" | cut -d. -f1).$(echo "$VER" | cut -d. -f2)"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

          UI="drumsergio/cashpilot:latest
          drumsergio/cashpilot:${VER}
          drumsergio/cashpilot:${MAJOR_MINOR}"

          WORKER="drumsergio/cashpilot-worker:latest
          drumsergio/cashpilot-worker:${VER}
          drumsergio/cashpilot-worker:${MAJOR_MINOR}"

          {
            echo "ui_tags<<EOF"
            echo "$UI"
            echo "EOF"
            echo "worker_tags<<EOF"
            echo "$WORKER"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/ && ruff format --check app/

  # Multi-arch build (amd64 + arm64) in a single QEMU-emulated job on the X64
  # runner. buildx pushes the multi-platform manifest under all tags directly,
  # so no separate ARM64 runner and no manifest-merge job are needed.
  build-ui:
    needs: [lint, resolve-tags]
    if: inputs.build_ui
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.resolve-tags.outputs.ui_tags }}
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

  build-worker:
    needs: [lint, resolve-tags]
    if: inputs.build_worker
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.resolve-tags.outputs.worker_tags }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
