name: Docker Hub Description

on:
  push:
    branches: [main]
    paths: [README.md]
  workflow_dispatch:

jobs:
  update-description:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Sync UI Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: drumsergio/cashpilot

      - name: Sync worker Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: drumsergio/cashpilot-worker
          short-description: "CashPilot worker — Docker agent that deploys and monitors passive-income service containers (pairs with the drumsergio/cashpilot UI)."
