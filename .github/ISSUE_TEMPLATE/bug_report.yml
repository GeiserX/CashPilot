name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker Compose
        - Docker Run
        - Unraid
        - Portainer
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CashPilot Version
      description: "Exact image tag from your docker-compose.yml or `docker inspect` output (do NOT write 'latest')"
      placeholder: "v0.2.72"
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - amd64 (x86_64)
        - arm64 (aarch64 / Raspberry Pi)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant container logs here.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have checked whether this is already fixed in the latest version
          required: true
        - label: I searched existing issues and this is not a duplicate
          required: true
